# ── Expires map — used by the server-level `expires` directive ──────────────
map $sent_http_content_type $expires {
    default                       off;
    text/html                     epoch;   # always revalidate HTML
    text/css                      max;
    ~font/                        max;
    application/vnd.ms-fontobject max;
    application/x-font-ttf        max;
    application/javascript        max;
    ~image/                       max;
    ~audio/                       max;
    ~video/                       max;
    # application/json intentionally omitted — never cache API responses
}

# ── ALB real-IP passthrough ─────────────────────────────────────────────────
# The ALB forwards the real client IP in X-Forwarded-For and communicates
# with this container over the VPC private network. Trust all RFC-1918 ranges
# so nginx logs the actual client IP, not the ALB's private IP.
real_ip_header     X-Forwarded-For;
real_ip_recursive  on;
set_real_ip_from   10.0.0.0/8;
set_real_ip_from   172.16.0.0/12;
set_real_ip_from   192.168.0.0/16;

# ── Map X-Forwarded-Proto → $fastcgi_https ─────────────────────────────────
# Lets PHP know the original connection was HTTPS even though nginx receives
# plain HTTP from the ALB. Passed to PHP-FPM as the HTTPS server variable.
map $http_x_forwarded_proto $fastcgi_https {
    default  '';
    https    on;
}

# ── Main server — HTTP only (ALB terminates TLS) ───────────────────────────
# SSL lives on the ALB with an ACM certificate. nginx only sees plain HTTP
# on port 80 from inside the VPC. HSTS belongs on the ALB HTTPS listener
# response-header policy, not here.
server {
    listen 80;
    server_name _;

    server_tokens        off;
    client_max_body_size 256m;   # aligned with PHP upload_max_filesize / post_max_size

    root  /var/www/html;
    index index.php;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Security headers ────────────────────────────────────────────────────
    # HSTS is intentionally absent — it must be set on the ALB HTTPS listener.
    add_header X-Content-Type-Options "nosniff"                             always;
    add_header X-Frame-Options        "SAMEORIGIN"                          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;

    # ── ALB health check ────────────────────────────────────────────────────
    # The ALB probes this path to determine target health. Must return 200;
    # do not redirect or require authentication. Keep it lightweight.
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip            on;
    gzip_disable    "MSIE [1-6]\.(?!.*SV1)";
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1;
    gzip_types      font/woff2 font/woff font/opentype application/x-font-ttf
                    text/plain text/css text/javascript
                    application/javascript application/x-javascript application/json;

    expires $expires;

    # ── Block sensitive files ───────────────────────────────────────────────
    # Hidden files (except .well-known)
    location ~ /\.(?!well-known) { deny all; }

    # WordPress XML-RPC — common brute-force / DDoS amplification target
    location = /xmlrpc.php { deny all; }

    # Protect wp-config.php from direct access
    location ~* /wp-config\.php { deny all; }

    # Prevent PHP execution inside uploads directory
    location ~* /(?:uploads|files)/.*\.php$ { deny all; }

    # ── Static assets — long-lived immutable cache ──────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|webp|ttf|svg|eot|otf|mp3|aac|ogg|oga|wav|flac|m4a|mp4|webm|ogv|mov|m4v|avi|mpg|mpeg)$ {
        add_header "Access-Control-Allow-Origin" "*";
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── WordPress — try files then pass to index.php ────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP-FPM ─────────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass    wordpress:9000;
        fastcgi_index   index.php;
        include         fastcgi_params;
        fastcgi_param   SCRIPT_FILENAME       $document_root$fastcgi_script_name;
        fastcgi_param   PATH_INFO             $fastcgi_path_info;

        # Tell PHP the original scheme and real client IP from the ALB headers.
        # $fastcgi_https is 'on' when ALB forwarded X-Forwarded-Proto: https,
        # which makes WordPress generate https:// URLs and keeps sessions intact.
        fastcgi_param   HTTPS                 $fastcgi_https;
        fastcgi_param   HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param   REMOTE_ADDR           $remote_addr;

        # Timeouts aligned with PHP max_execution_time (360s)
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    360s;
        fastcgi_read_timeout    360s;

        # Buffers — avoids temp-file writes for most PHP responses
        fastcgi_buffer_size 32k;
        fastcgi_buffers     16 16k;
    }
}
