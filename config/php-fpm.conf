; Disable PHP-FPM's own access log.
; nginx already records every request; keeping this enabled produces duplicate
; log lines in `docker compose logs wordpress` due to the interaction between
; access.log = /proc/self/fd/2 and catch_workers_output = yes (both write to
; the same file descriptor).
; PHP-FPM does not accept an empty value — it tries to open a blank path and
; crashes. Redirecting to /dev/null silently discards the entries instead.
[www]
access.log = /dev/null
