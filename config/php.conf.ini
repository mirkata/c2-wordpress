file_uploads = On
allow_url_fopen = On
short_open_tag = On
memory_limit = 1024M
upload_max_filesize = 256M
post_max_size = 256M
max_execution_time = 360
date.timezone = Europe/Amsterdam

; Error handling — never expose errors to the browser; always log them
display_errors = Off
display_startup_errors = Off
log_errors = On

; redis and calendar extensions are enabled in Dockerfile.wordpress, not here
